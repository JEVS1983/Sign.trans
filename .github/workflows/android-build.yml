name: Auto Deploy Play Store

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Clonar repositorio
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Java compatible con Gradle viejo
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 8

      # 3. Instalar Gradle
      - name: Install Gradle
        run: |
          sudo apt update
          sudo apt install -y gradle

      # 4. Generar gradlew automáticamente
      - name: Generate Wrapper
        run: gradle wrapper

      # 5. Corregir opciones JVM (evita error --add-opens)
      - name: Fix Gradle JVM options
        run: |
          echo "org.gradle.jvmargs=" >> gradle.properties

      # 6. Instalar Fastlane
      - name: Install Fastlane
        run: sudo gem install fastlane

      # 7. Crear keystore
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release-key.jks

      # 8. Build sin daemon (clave)
      - name: Build AAB
        run: |
          chmod +x gradlew
          ./gradlew clean
          ./gradlew bundleRelease --no-daemon

      # 9. Deploy a Play Store
      - name: Deploy to Play Store
        run: fastlane deploy
        env:
          GOOGLE_PLAY_JSON: ${{ secrets.GOOGLE_PLAY_JSON }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
